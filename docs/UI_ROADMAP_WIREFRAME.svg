<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="980" viewBox="0 0 1440 980">
  <defs>
    <style>
      .bg{fill:#f6f8fb}
      .panel{fill:#fff;stroke:#d8e0ea;stroke-width:1.4}
      .soft{fill:#f8fafc;stroke:#e2e8f0;stroke-width:1}
      .accent{fill:#2563eb}
      .accent-soft{fill:#eff6ff;stroke:#bfdbfe}
      .red{fill:#dc2626}
      .green{fill:#16a34a}
      .amber{fill:#f59e0b}
      .ink{fill:#0f172a;font-family:"Microsoft YaHei","Segoe UI",Arial,sans-serif}
      .muted{fill:#64748b;font-family:"Microsoft YaHei","Segoe UI",Arial,sans-serif}
      .tiny{font-size:18px}
      .small{font-size:22px}
      .mid{font-size:26px;font-weight:700}
      .title{font-size:34px;font-weight:800}
      .label{font-size:18px;font-weight:700}
      .note{font-size:16px}
      .line{stroke:#d8e0ea;stroke-width:1}
      .dash{stroke:#94a3b8;stroke-width:1.5;stroke-dasharray:8 8}
    </style>
  </defs>

  <rect class="bg" width="1440" height="980"/>

  <text x="48" y="56" class="ink title">基金持仓分析工作台 UI 路线图</text>
  <text x="48" y="92" class="muted small">原则：先保证每日可用，再逐步加入情景推演和个人行为画像，避免一次塞满功能。</text>

  <rect x="48" y="124" width="1344" height="72" rx="12" class="panel"/>
  <text x="76" y="168" class="ink mid">第一屏只回答 3 件事：今天怎么样、哪里有风险、我该不该动作</text>
  <rect x="1100" y="142" width="256" height="36" rx="18" class="accent-soft"/>
  <text x="1132" y="166" class="accent label">当前优先版本 MVP</text>

  <rect x="48" y="226" width="900" height="690" rx="14" class="panel"/>
  <rect x="972" y="226" width="420" height="690" rx="14" class="panel"/>

  <rect x="76" y="254" width="844" height="64" rx="10" class="soft"/>
  <text x="100" y="294" class="ink mid">今日概览</text>
  <rect x="632" y="268" width="132" height="36" rx="8" class="accent"/>
  <text x="662" y="292" fill="#fff" class="label">刷新</text>
  <rect x="780" y="268" width="112" height="36" rx="8" class="soft"/>
  <text x="808" y="292" class="muted label">导入</text>

  <g>
    <rect x="76" y="342" width="198" height="110" rx="10" class="panel"/>
    <text x="98" y="376" class="muted tiny">总市值</text>
    <text x="98" y="416" class="ink mid">¥128,430</text>
    <text x="98" y="440" class="red tiny">+¥1,235 今日</text>

    <rect x="290" y="342" width="198" height="110" rx="10" class="panel"/>
    <text x="312" y="376" class="muted tiny">权益仓位</text>
    <text x="312" y="416" class="ink mid">62%</text>
    <text x="312" y="440" class="amber tiny">接近上限</text>

    <rect x="504" y="342" width="198" height="110" rx="10" class="panel"/>
    <text x="526" y="376" class="muted tiny">今日建议</text>
    <text x="526" y="416" class="ink mid">3 条</text>
    <text x="526" y="440" class="muted tiny">1 执行 · 2 观察</text>

    <rect x="718" y="342" width="202" height="110" rx="10" class="panel"/>
    <text x="740" y="376" class="muted tiny">数据源</text>
    <text x="740" y="416" class="green mid">正常</text>
    <text x="740" y="440" class="muted tiny">估值 / 指数 / 持仓</text>
  </g>

  <rect x="76" y="484" width="844" height="220" rx="12" class="panel"/>
  <text x="100" y="524" class="ink mid">持仓估值表</text>
  <text x="760" y="524" class="muted tiny">搜索基金</text>
  <line x1="100" y1="548" x2="896" y2="548" class="line"/>
  <text x="100" y="580" class="muted note">基金</text>
  <text x="410" y="580" class="muted note">估值</text>
  <text x="540" y="580" class="muted note">仓位</text>
  <text x="660" y="580" class="muted note">今日盈亏</text>
  <text x="800" y="580" class="muted note">状态</text>

  <g class="tiny">
    <text x="100" y="622" class="ink">白酒主题基金</text>
    <text x="410" y="622" class="red">+1.8%</text>
    <text x="540" y="622" class="ink">18%</text>
    <text x="660" y="622" class="red">+¥420</text>
    <rect x="794" y="600" width="82" height="30" rx="15" fill="#fef3c7"/>
    <text x="812" y="622" class="amber">观察</text>

    <text x="100" y="666" class="ink">纳指 QDII</text>
    <text x="410" y="666" class="green">-0.6%</text>
    <text x="540" y="666" class="ink">12%</text>
    <text x="660" y="666" class="green">-¥96</text>
    <rect x="794" y="644" width="82" height="30" rx="15" fill="#eff6ff"/>
    <text x="812" y="666" class="accent">持有</text>
  </g>

  <rect x="76" y="732" width="410" height="152" rx="12" class="panel"/>
  <text x="100" y="770" class="ink mid">组合风险</text>
  <rect x="100" y="794" width="320" height="12" rx="6" fill="#e2e8f0"/>
  <rect x="100" y="794" width="210" height="12" rx="6" class="accent"/>
  <text x="100" y="836" class="muted tiny">消费 + 白酒暴露偏高，先提示，不自动下结论。</text>

  <rect x="510" y="732" width="410" height="152" rx="12" class="panel"/>
  <text x="534" y="770" class="ink mid">复盘入口</text>
  <text x="534" y="812" class="muted tiny">记录：执行 / 跳过 / 原因 / 明日观察点</text>
  <rect x="534" y="836" width="154" height="34" rx="8" class="soft"/>
  <text x="558" y="859" class="muted label">写今日复盘</text>

  <rect x="1000" y="254" width="364" height="204" rx="12" class="accent-soft"/>
  <text x="1024" y="294" class="ink mid">今日建议</text>
  <text x="1024" y="332" class="ink small">观察：白酒基金暂不补仓</text>
  <text x="1024" y="364" class="muted tiny">原因：仓位接近上限，主题集中度偏高。</text>
  <rect x="1024" y="396" width="94" height="34" rx="8" fill="#fff" stroke="#bfdbfe"/>
  <text x="1048" y="419" class="accent label">执行</text>
  <rect x="1130" y="396" width="94" height="34" rx="8" fill="#fff" stroke="#bfdbfe"/>
  <text x="1154" y="419" class="muted label">跳过</text>

  <rect x="1000" y="484" width="364" height="172" rx="12" class="panel"/>
  <text x="1024" y="524" class="ink mid">证据链</text>
  <text x="1024" y="564" class="muted tiny">估值来源：天天基金</text>
  <text x="1024" y="596" class="muted tiny">参考指数：沪深300 / 中证消费</text>
  <text x="1024" y="628" class="muted tiny">风险依据：行业暴露 32%</text>

  <rect x="1000" y="682" width="364" height="202" rx="12" class="panel"/>
  <text x="1024" y="722" class="ink mid">下一阶段占位</text>
  <text x="1024" y="762" class="muted tiny">阶段 2：情景推演，不放第一屏中心。</text>
  <text x="1024" y="794" class="muted tiny">阶段 3：行为画像，依赖复盘数据积累。</text>
  <text x="1024" y="826" class="muted tiny">阶段 4：自然语言入口，先做常用问题。</text>

  <line x1="48" y1="940" x2="1392" y2="940" class="dash"/>
  <text x="48" y="964" class="muted note">交付顺序：持仓估值 + 建议执行 → 证据链和复盘 → 情景推演 → 行为画像 → 自然语言研究入口</text>
</svg>
